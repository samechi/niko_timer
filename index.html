<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>にこのティータイムタイマー // NIKO_TEA_TIMER</title>
    <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --niko-pink: #ffb5c5;
            --niko-pink-light: #ffe6ea;
            --niko-cream: #fffaf0;
            --niko-gold: #f0e68c;
            --niko-brown: #8b4513;
            --font-main: 'Mochiy+Pop One', sans-serif;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; overflow: hidden;
            font-family: var(--font-main);
        }

        /* 背景画像の設定 */
        #bg {
            position: fixed; inset: 0;
            background-image: url('bg.png'); 
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .overlay {
            height: 100vh;
            background: rgba(255, 230, 234, 0.7); 
            backdrop-filter: blur(3px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* 中央寄せ */
            color: var(--niko-brown);
            /* 下にフッターがある分、少しだけ上にオフセット（底上げ） */
            padding-bottom: 10vh; 
            box-sizing: border-box;
        }

        /* 設定エリア */
        .setup-area {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--niko-cream);
            padding: 15px 25px;
            border-radius: 50px;
            border: 3px solid var(--niko-pink);
            box-shadow: 0 5px 0 var(--niko-pink);
        }

        input[type="number"] {
            width: 70px;
            padding: 8px;
            font-size: 1.5rem;
            border-radius: 15px;
            border: 2px solid var(--niko-pink);
            text-align: center;
            background: #fff;
            color: var(--niko-brown);
            font-family: var(--font-main);
        }

        /* タイマー表示 */
        #timer {
            font-size: clamp(5rem, 20vw, 10rem); /* 画面幅に合わせて可変、かつ最大サイズを制限 */
            font-weight: bold;
            margin: 10px 0;
            color: var(--niko-pink);
            text-shadow: 4px 4px 0px #fff, 6px 6px 0px var(--niko-brown);
            letter-spacing: -2px;
            line-height: 1; /* 余計な上下の隙間をカット */
            }

        /* アプリ内ボタン */
        .controls { display: flex; gap: 20px; }
        
        .controls button, .setup-area button {
            padding: 12px 35px;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            border-radius: 30px;
            background: var(--niko-pink);
            color: white;
            transition: 0.2s;
            font-family: var(--font-main);
            box-shadow: 0 5px 0 var(--niko-brown);
        }

        #setBtn {
            padding: 8px 20px;
            font-size: 1rem;
            background: var(--niko-gold);
        }

        .controls button:hover, .setup-area button:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        .controls button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 var(--niko-brown);
        }

        /* --- ナビゲーションフッター --- */
        .system-footer {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 1000;
        }

        .btn-niko-nav {
            background: var(--niko-pink);
            border: 3px solid #fff;
            color: #fff;
            padding: 10px 25px;
            cursor: pointer;
            font-size: 13px;
            text-decoration: none;
            transition: 0.3s;
            border-radius: 50px;
            box-shadow: 0 5px 0 var(--niko-brown);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-niko-nav:hover {
            background: var(--niko-cream);
            color: var(--niko-pink);
            transform: translateY(3px);
            box-shadow: 0 2px 0 var(--niko-brown);
        }

        body { padding-bottom: 80px; }
    </style>
</head>
<body>

    <div id="bg"></div>

    <div class="overlay">
        <div class="setup-area">
            <input type="number" id="minutesInput" value="3" min="1" max="999">
            <span style="font-weight: bold; margin: 0 10px;">ぷん(分)</span>
            <button id="setBtn">セット✨</button>
        </div>

        <div id="timer">03:00</div>
        
        <div class="controls">
            <button id="startStopBtn">スタート</button>
            <button id="resetBtn">リセット</button>
        </div>
    </div>

    <script>
        let timeLeft = 180; 
        let timerId = null;

        const timerDisplay = document.getElementById('timer');
        const minutesInput = document.getElementById('minutesInput');
        const setBtn = document.getElementById('setBtn');
        const startStopBtn = document.getElementById('startStopBtn');
        const resetBtn = document.getElementById('resetBtn');

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            timerDisplay.textContent = `${m}:${s}`;
        }

        setBtn.addEventListener('click', () => {
            const mins = parseInt(minutesInput.value);
            if (mins > 0) {
                timeLeft = mins * 60;
                updateDisplay();
                stopTimer();
            }
        });

        function startTimer() {
            if (timerId !== null) return;
            timerId = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateDisplay();
                } else {
                    clearInterval(timerId);
                    timerId = null;
                    startStopBtn.textContent = 'まほう開始';
                    alert('お時間だよ！笑顔で戻ってきてね🧸✨');
                }
            }, 1000);
            startStopBtn.textContent = 'ちょっと休憩';
            setBtn.disabled = true;
        }

        function stopTimer() {
            clearInterval(timerId);
            timerId = null;
            startStopBtn.textContent = 'まほう開始';
            setBtn.disabled = false;
        }

        startStopBtn.addEventListener('click', () => {
            if (timerId === null) startTimer();
            else stopTimer();
        });

        resetBtn.addEventListener('click', () => {
            stopTimer();
            const mins = parseInt(minutesInput.value);
            timeLeft = mins * 60;
            updateDisplay();
        });

        updateDisplay();
    </script>
</body>
</html>
